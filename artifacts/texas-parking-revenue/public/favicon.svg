<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Parking sign blue background -->
  <rect width="100" height="100" fill="#0057B8"/>
  <!-- White inset border frame — like a real sign -->
  <rect x="6" y="6" width="88" height="88" fill="none" stroke="white" stroke-width="4"/>
  <!-- Dollar sign, bold, centered -->
  <text
    x="50"
    y="50"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="64"
    fill="white"
    text-anchor="middle"
    dominant-baseline="central">$</text>
</svg>
